<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <meta http-equiv="X-UA-Compatible" content="chrome=1">
  <link href='https://fonts.googleapis.com/css?family=Chivo:900' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" type="text/css" href="css/styles.css" media="screen">
  <link rel="stylesheet" type="text/css" href="css/print.css" media="print">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" integrity="sha384-UHRtZLI+pbxtHCWp1t77Bi1L4ZtiqrqD80Kn4Z8NTSRyMA2Fd33n5dQ8lWUE00s/" crossorigin="anonymous">
  <style>
    .share-btn > a {
      display: inline-block;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 5px;
      font-size: 14px;
      margin-bottom: 3px;
      font-family: Verdana, Arial, sans-serif;
      width: 90px;
      text-align: center;
    }
    .share-btn > a:hover {
      cursor: pointer;
    }
  </style>
  <title>Share-buttons by Yauheni Pakala</title>
</head>

<body>
  <div id="container">
    <div class="inner">

      <header>
        <h1>Share-buttons</h1>
        <h2>Super fast and easy Social Media Sharing Buttons for your site.</h2>
      </header>

      <section id="downloads" class="clearfix">
        <a href="https://github.com/yauhenipakala/share-buttons/zipball/master" id="download-zip" class="button"><span>Download .zip</span></a>
        <a href="https://github.com/yauhenipakala/share-buttons" id="view-on-github" class="button"><span>View on GitHub</span></a>
      </section>

      <hr>
      <h2>Demo:</h2>

      <div class="share-btn" data-url="https://github.com/yauhenipakala/share-buttons">
        <a class="btn-vk" data-id="vk"><i class="fab fa-vk"></i> VK</a>
        <a class="btn-facebook" data-id="fb"><i class="fab fa-facebook-square"></i> Facebook</a>
        <a class="btn-twitter" data-id="tw"><i class="fab fa-twitter"></i> Twitter</a>
        <a class="btn-telegram" data-id="tg"><i class="fab fa-telegram"></i> Telegram</a>
        <a class="btn-pocket" data-id="pk"><i class="fab fa-get-pocket"></i> Pocket</a>
        <a class="btn-reddit" data-id="re"><i class="fab fa-reddit"></i> Reddit</a>
        <a class="btn-evernote" data-id="ev"><i class="far fa-sticky-note"></i> Evernote</a>
        <a class="btn-linkedin" data-id="in"><i class="fab fa-linkedin"></i> LinkedIn</a>
        <a class="btn-pinterest" data-id="pi"><i class="fab fa-pinterest"></i> Pinterest</a>
        <a class="btn-whatsapp" data-id="wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        <a class="btn-ok" data-id="ok"><i class="fab fa-odnoklassniki"></i> OK</a>
        <a class="btn-tumblr" data-id="tu"><i class="fab fa-tumblr"></i> Tumblr</a>
        <a class="btn-hn" data-id="hn"><i class="fab fa-hacker-news"></i> Hacker N</a>
        <a class="btn-xing" data-id="xi"><i class="fab fa-xing"></i> Xing</a>
        <a class="btn-mst" data-id="mst"><i class="fab fa-microsoft"></i> Teams</a>
        <a class="btn-mail" data-id="mail"><i class="fas fa-at"></i> EMail</a>
        <a class="btn-print" data-id="print"><i class="fas fa-print"></i> Print</a>
        <a class="btn-copy" data-id="copy"><i class="fas fa-copy"></i> Copy</a>
        <a class="btn-share" data-id="share"><i class="fas fa-ellipsis-h"></i> Share</a>
      </div>

    </div>
  </div>



  <!-- WILL BE CHANGED DURING DEPLOY -->
  <script src="../dist/share-buttons.js"></script>

  <!-- ANALYTICS HERE -->

  <!-- /WILL BE CHANGED DURING DEPLOY -->
</body>
</html>
